<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="estilos.css">
</head>
<body>

 <div class="grid">

    <div class="card" id="click">Click me! (click)</div>
    <div class="card" id="hover">Hover over (mouseover)</div>
    <div class="card" id="dblclick">Double click (dblclick)</div>
    <div class="card" id="keydown" tabindex="0">Type here (keydown)</div>

    <input class="card input" id="focus" placeholder="Focus on (focus)">
    <input class="card input" id="blur" placeholder="Leave input (blur)">

    <form id="form" class="card form">
        Submit form (submit)
        <button type="submit">Enviar</button>
    </form>

    <select class="card input" id="change">
        <option>Change value</option>
        <option>Opción 1</option>
        <option>Opción 2</option>
    </select>

</div>





    
</body>

    <script src="Events.js"></script>

</html>
